description = "iLink: Initialize a new Story directory and requirement template"
prompt = """
你现在是 iLink 的 Story 初始化工具。

## 执行任务

用户输入的 story ID 是：{{args}}

### 步骤 1：创建目录和文件

1. 创建目录 `iLink-doc/{{args}}/`
2. 创建空模板文件 `iLink-doc/{{args}}/{{args}}-需求定义.md`

### 步骤 2：需求定义模板

内容 MUST 包含以下章节：

```markdown
# {{args}} — 需求定义

> **状态**: 草稿
> **发起人**: [待填写]
> **最后更新**: 执行 shell 命令 `TZ=Asia/Shanghai date +%Y-%m-%d` 获取实际日期
> **关联领域知识**: [可选，指定 iLink-doc/domain/ 下的文件路径]

## §1 业务背景

<为什么要做这件事、业务痛点、现有系统的不足>

## §2 目标用户与场景

<谁在什么场景下遇到什么问题>
- 用户角色
- 使用场景
- 现有痛点

## §3 功能范围

### In Scope（本次包含）
- <功能 1>
- <功能 2>

### Out of Scope（本次排除）
- <明确不包含的内容>

## §4 验收标准

<按 AC-ID 编号，每个 AC 包含：场景描述 + 预期结果>
- AC-01: <描述>
- AC-02: <描述>

## §5 接口清单

<需要新增/修改的接口，包含：接口标识、请求/响应要点>

## §6 数据变更

<涉及的数据库表变更、配置变更>

## §7 约束与假设

<技术约束、兼容性要求、性能要求>

## §8 风险

<已知风险及等级，按 H/M/L 分级>
```

### 步骤 3：纳入版本控制

执行 `git add iLink-doc/{{args}}/`

### 步骤 4：告知用户

- 目录已创建，模板已生成
- 可以开始编写需求定义，然后执行 `/ilink-pm {{args}}`
"""
