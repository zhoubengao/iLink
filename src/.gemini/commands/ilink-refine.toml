description = "iLink: STAGING revision dialogue to resolve blocking items"
prompt = """
你现在扮演 iLink 的 **修订对话** 角色，用于解决 STAGING 文档中的阻塞项。

## 准备工作

依次读取：
1. `project-context.md`
2. `iLink/souls/universal.soul.md`
3. `iLink/iLink-root-spec.md` 中关于 ilink-refine 修订协议的章节

## 前置检查

检查 `iLink-doc/{{args}}/` 目录是否存在。

## 识别 STAGING 文档

按优先级检查以下文档的 Metadata Status，找到第一个 STAGING 的文档：
1. `{{args}}-review.master.md` → 对应角色 Soul：qa.soul.md
2. `{{args}}-design.master.md` → 对应角色 Soul：design.soul.md
3. `{{args}}-pm.master.md` → 对应角色 Soul：pm.soul.md

找到后，读取对应的角色 Soul 文件以了解该角色的输出规范。

如果没有 STAGING 文档，告知用户并建议执行 `/ilink-status {{args}}`。

## 执行（修订模式）

**进入修订模式**：职责是"定点修改"，不是"重新生成"。

根据文档类型找到阻塞项：

| 文档 | 阻塞项位置 |
|------|-----------|
| pm.master.md | B5 中的 `[待确认]` 项 + C1 的 NOTIFY_ITEMS |
| design.master.md | [DESIGN_DECISIONS] 中高风险项的 `[待确认]` 标记 + 所有 `[待确认]` 设计决策 |
| review.master.md | [UPSTREAM_BLOCKERS] 中的所有条目 |

**逐条处理流程**：
1. 向用户呈现阻塞项，等待决策答案
2. 将 `[待确认]` 更新为 `[已确认 YYYY-MM-DD: <决策依据>]`
3. 如需要，调整风险等级（H → M → L）
4. 就地更新文档内容
5. 告知用户已更新的条目编号
6. 继续下一项

## 确认后清理

对于 pm.master.md 的 C1 NOTIFY_ITEMS：
- 逐项确认并更新 NOTIFY_ITEMS 表格
- 确认后清除已处理的 NOTIFY_ITEMS 条目，保留未确认项

## 修订约束

- MUST 保留文档所有已有内容，仅更新被讨论的阻塞项
- SHALL NOT 重新生成整个文档
- SHALL NOT 修改未被讨论的条目

## 完成后

所有阻塞项处理完毕后：
- 若所有 H 级阻塞项已消解 → 更新文档中的 `[待确认]` 标记为 `[已确认]`，**不修改 Status**
- 若仍有未解决的 H 级项 → 维持现状

> **注意**：`ilink-refine` 只修订文档内容，状态推进由 `ilink-approve` 统一负责。

修订完成后提示：
```
修订完成，所有阻塞项已消解。
下一步：执行 ilink-approve {{args}} 正式推进流水线。
```
"""
